name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore src/ZhuangJiAgent.sln

    - name: Build
      run: dotnet build src/ZhuangJiAgent.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test src/ZhuangJiAgent.sln --configuration Release --no-build --verbosity normal

    - name: Publish artifact
      if: success() && github.ref == 'refs/heads/main'
      run: dotnet publish src/ZhuangJiAgent/ZhuangJiAgent.csproj --configuration Release --output ./publish

    - name: Upload artifact
      if: success() && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: ZhuangJiAgent-${{ github.sha }}
        path: ./publish
